<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>The Quiet Hours</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Quiet Hours">
<meta name="theme-color" content="#241b2e">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&family=Press+Start+2P&family=Silkscreen:wght@400;700&family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#241b2e;
    --paper:#2f2438;
    --paper-raised:#3a2d46;
    --cream:#ede3f0;
    --cream-dim:#c3b3cc;
    --amber:#d98fa3;
    --amber-dim:#c2748c;
    --plum:#a78bc4;
    --sage:#8fae82;
    --border:rgba(var(--cream-rgb),0.1);
    --amber-rgb:217,143,163;
    --sage-rgb:143,174,130;
    --plum-rgb:167,139,196;
    --cream-rgb:237,227,240;
    --bg-rgb:36,27,46;
  }
  /* seasonal accent overrides — base identity (bg/paper/cream) stays constant, only accents drift */
  body.season-spring{
    --amber:#e29bb5; --amber-dim:#c97e9a; --plum:#b58ecb; --sage:#8fc48a;
    --amber-rgb:226,155,181; --sage-rgb:143,196,138; --plum-rgb:181,142,203;
  }
  body.season-summer{
    --amber:#eeb35a; --amber-dim:#d4964a; --plum:#c98bd4; --sage:#9fbf7a;
    --amber-rgb:238,179,90; --sage-rgb:159,191,122; --plum-rgb:201,139,212;
  }
  body.season-fall{
    --amber:#d68a52; --amber-dim:#b8703f; --plum:#a5657a; --sage:#93985f;
    --amber-rgb:214,138,82; --sage-rgb:147,152,95; --plum-rgb:165,101,122;
  }
  body.season-winter{
    --amber:#8fb0d9; --amber-dim:#7295bd; --plum:#9b8bc4; --sage:#7fa8a0;
    --amber-rgb:143,176,217; --sage-rgb:127,168,160; --plum-rgb:155,139,196;
  }
  .pixel{font-family:'Press Start 2P', monospace;}
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--cream);
    font-family:'Lora',serif;
    min-height:100vh;
    min-height:100dvh;
    overflow-x:hidden;
    position:relative;
  }

  /* lamplight signature */
  .lamplight{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
    background:radial-gradient(ellipse 60% 45% at 50% 28%, rgba(var(--amber-rgb),0.16), rgba(var(--amber-rgb),0.06) 40%, rgba(var(--bg-rgb),0) 70%);
    animation:flicker 7s ease-in-out infinite;
  }
  @keyframes flicker{
    0%,100%{opacity:1;}
    45%{opacity:0.85;}
    50%{opacity:1;}
    72%{opacity:0.92;}
  }
  @media (prefers-reduced-motion: reduce){
    .lamplight{animation:none;}
  }

  #app{position:relative; z-index:1; max-width:640px; margin:0 auto; padding:env(safe-area-inset-top,0) 20px calc(env(safe-area-inset-bottom,0) + 20px);}

  /* ---- auth screen ---- */
  .auth-screen{
    min-height:100vh; min-height:100dvh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:18px; padding:20px;
  }
  .auth-title{font-family:'Silkscreen', monospace; font-weight:700; font-size:1.6rem; color:var(--cream); letter-spacing:0.01em; line-height:1.6;}
  .auth-sub{color:var(--cream-dim); font-size:0.95rem; max-width:320px; line-height:1.6;}
  .auth-form{display:flex; flex-direction:column; gap:12px; width:100%; max-width:320px; margin-top:8px;}
  input[type=email], input[type=password]{
    background:var(--paper); border:1px solid var(--border); color:var(--cream);
    padding:14px 16px; border-radius:10px; font-family:'Lora',serif; font-size:1rem;
  }
  input[type=email]:focus, input[type=password]:focus{outline:2px solid var(--amber-dim); outline-offset:2px;}
  .btn{
    background:var(--amber); color:#211823; border:none; padding:14px 20px;
    border-radius:10px; font-family:'Lora',serif; font-weight:500; font-size:0.95rem;
    cursor:pointer; transition:opacity 0.15s;
  }
  .btn:hover{opacity:0.9;}
  .btn:focus-visible{outline:2px solid var(--cream); outline-offset:2px;}
  .btn-ghost{
    background:transparent; border:1px solid var(--border); color:var(--cream-dim);
  }
  .auth-msg{color:var(--sage); font-size:0.85rem; min-height:1.2em;}

  /* ---- header/nav ---- */
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:22px 0 14px; position:sticky; top:0; z-index:5;
    background:linear-gradient(var(--bg) 70%, transparent);
  }
  .wordmark{font-family:'Silkscreen', monospace; font-weight:700; font-size:0.95rem; color:var(--amber); line-height:1.5; letter-spacing:0.01em;}
  .flourish{font-size:0.85rem; opacity:0.75; margin-left:6px;}

  .page-card{
    background:
      radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px) 0 0/16px 16px,
      var(--paper);
    border-radius:10px; padding:26px 22px 16px; position:relative;
    box-shadow:0 6px 22px rgba(10,6,14,0.35); margin-bottom:6px;
    border:3px solid var(--paper-raised);
  }
  .page-card::before{
    content:'🍄'; position:absolute; top:-11px; left:-8px; font-size:1.3rem;
    transform:rotate(-14deg); filter:drop-shadow(0 2px 2px rgba(0,0,0,0.35));
  }
  .page-card::after{
    content:'⭐'; position:absolute; top:-11px; right:-6px; font-size:1.05rem;
    transform:rotate(16deg); filter:drop-shadow(0 2px 2px rgba(0,0,0,0.35));
  }
  body.season-spring .page-card::before{ content:'🌸'; }
  body.season-spring .page-card::after{ content:'🐛'; }
  body.season-summer .page-card::before{ content:'🌻'; }
  body.season-summer .page-card::after{ content:'🦋'; }
  body.season-fall .page-card::before{ content:'🍂'; }
  body.season-fall .page-card::after{ content:'🎃'; }
  body.season-winter .page-card::before{ content:'❄️'; }
  body.season-winter .page-card::after{ content:'🌙'; }
  .entry-divider{border-top:2px dashed var(--border); margin:14px 0 16px;}
  .divider{
    text-align:center; color:var(--amber-dim); opacity:0.85; font-size:0.6rem;
    margin:26px 0; letter-spacing:0.3em; animation:twinkle 2.6s ease-in-out infinite;
  }
  @keyframes twinkle{ 0%,100%{opacity:0.55;} 50%{opacity:1;} }
  .sprite-critter{
    display:inline-block; width:28px; height:28px; border-radius:50% 50% 45% 45%;
    background:radial-gradient(circle at 35% 30%, #b3d1a3, var(--sage));
    position:relative; vertical-align:middle; margin-right:6px;
    box-shadow:inset 0 -3px 4px rgba(0,0,0,0.18), 0 1px 3px rgba(0,0,0,0.25);
    animation:spriteBob 2.6s ease-in-out infinite;
  }
  @keyframes spriteBob{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-3px);} }
  @media (prefers-reduced-motion: reduce){ .sprite-critter, .divider{animation:none;} }
  .sprite-critter::before, .sprite-critter::after{
    content:''; position:absolute; width:15%; height:20%; background:#fff;
    border-radius:50%; top:40%;
  }
  .sprite-critter::before{left:25%;}
  .sprite-critter::after{right:25%;}
  .sprite-wrap{position:relative; display:inline-block; vertical-align:middle;}
  .sprite-accessory{
    position:absolute; top:-9px; left:50%; transform:translateX(-50%) rotate(-8deg);
    font-size:0.8rem; pointer-events:none; line-height:1;
  }
  .sprite-sparkle{
    position:absolute; top:-4px; right:-7px; font-size:0.55rem;
    pointer-events:none; animation:twinkle 2s ease-in-out infinite;
  }
  .sprite-aura .sprite-critter{
    box-shadow:inset 0 -3px 4px rgba(0,0,0,0.18), 0 0 14px 4px rgba(var(--amber-rgb),0.4);
  }
  .sprite-caption{font-family:'Press Start 2P', monospace; font-size:0.48rem; color:var(--cream-dim); margin-top:4px; line-height:1.7;}
  .sprite-caption .edit-link{margin-left:6px;}
  nav{display:flex; gap:4px; background:var(--paper); border-radius:10px; padding:3px;}
  nav button{
    background:transparent; border:none; color:var(--cream-dim); padding:9px 12px;
    border-radius:8px; font-family:'Press Start 2P', monospace; font-size:0.55rem; cursor:pointer;
  }
  nav button.active{background:var(--paper-raised); color:var(--amber);}

  /* ---- today page ---- */
  .date-line{font-family:'Press Start 2P', monospace; font-size:0.6rem; letter-spacing:0.04em; color:var(--cream-dim); text-transform:uppercase; margin-bottom:10px; line-height:1.6;}
  .streak{
    display:inline-flex; align-items:center; gap:6px; font-family:'Press Start 2P', monospace;
    font-size:0.55rem; color:var(--amber); margin-bottom:22px; line-height:1.8;
  }
  .streak .pixel{font-size:0.65rem;}

  .prompt-chip{
    display:inline-block; background:var(--paper); border:1px solid var(--border);
    color:var(--cream-dim); font-size:1.15rem; padding:8px 16px; border-radius:20px;
    cursor:pointer; margin-bottom:18px; font-family:'Caveat', cursive; font-weight:600;
    transition:border-color 0.15s;
  }
  .prompt-chip:hover{border-color:var(--amber-dim);}

  textarea{
    width:100%; min-height:44vh; background:transparent; border:none; color:#d6c8de;
    font-family:'Lora',serif; font-size:1.08rem; line-height:1.85; resize:vertical;
    padding:0 0 20px; border-bottom:1px solid var(--border);
  }
  textarea::placeholder{color:rgba(var(--cream-rgb),0.28); font-style:italic;}
  textarea:focus{outline:none;}

  .tag-row{display:flex; flex-wrap:wrap; gap:8px; margin:18px 0;}
  .tag-group{display:flex; flex-direction:column; gap:6px;}
  .tag-label{font-family:'Press Start 2P', monospace; font-size:0.52rem; color:var(--cream-dim); text-transform:uppercase; letter-spacing:0.02em; line-height:1.6;}
  .edit-link{color:var(--amber-dim); cursor:pointer; text-transform:none; letter-spacing:0; margin-left:6px;}
  .tag-options{display:flex; gap:6px; flex-wrap:wrap;}
  .tag-btn{
    background:var(--paper); border:1px solid var(--border); color:var(--cream-dim);
    padding:6px 11px; border-radius:16px; font-size:0.85rem; cursor:pointer; font-family:'Lora',serif;
    transition:background 0.12s, border-color 0.12s, transform 0.08s;
  }
  .tag-btn:active{transform:scale(0.94);}
  .tag-btn.selected{background:rgba(var(--sage-rgb),0.18); border-color:var(--sage); color:var(--cream);}

  /* freeform private tags */
  .private-tags{margin:18px 0;}
  .tag-input-row{display:flex; gap:8px; margin-top:6px;}
  .tag-input-row input{
    flex:1; background:var(--paper); border:1px solid var(--border); color:var(--cream);
    padding:8px 12px; border-radius:16px; font-family:'Lora',serif; font-size:0.85rem;
  }
  .tag-input-row input:focus{outline:1px solid var(--amber-dim);}
  .tag-input-row button{
    background:var(--paper-raised); border:1px solid var(--border); color:var(--amber);
    padding:8px 14px; border-radius:16px; font-size:0.85rem; cursor:pointer; font-family:'Lora',serif;
  }
  .chip-list{display:flex; flex-wrap:wrap; gap:6px; margin-top:10px;}
  .chip{
    display:inline-flex; align-items:center; gap:6px; background:rgba(var(--plum-rgb),0.25);
    border:1px solid var(--plum); color:var(--cream); padding:5px 6px 5px 12px;
    border-radius:14px; font-size:0.8rem; font-family:'Lora',serif;
  }
  .chip button{background:none; border:none; color:var(--cream-dim); cursor:pointer; font-size:0.95rem; padding:0 6px; line-height:1;}
  .chip button:hover{color:var(--cream);}

  /* archive filter + tags */
  .filter-bar{display:flex; flex-wrap:wrap; gap:6px; margin:14px 0 4px;}
  .filter-pill{
    background:var(--paper); border:1px solid var(--border); color:var(--cream-dim);
    padding:6px 11px; border-radius:8px; font-size:0.55rem; cursor:pointer; font-family:'Press Start 2P', monospace;
  }
  .filter-pill.active{background:rgba(var(--amber-rgb),0.18); border-color:var(--amber-dim); color:var(--amber);}
  .archive-tags{display:flex; flex-wrap:wrap; gap:5px; margin-top:8px;}
  .archive-tag-pill{font-size:0.55rem; font-family:'Press Start 2P', monospace; color:var(--sage); background:rgba(var(--sage-rgb),0.12); padding:3px 8px; border-radius:6px;}
  .tag-manager{background:var(--paper); border-radius:12px; padding:14px; margin-bottom:16px; display:flex; flex-direction:column; gap:8px;}
  .tag-manager-row{display:flex; gap:6px; align-items:center;}
  .tag-manager-row input{
    flex:1; background:var(--paper-raised); border:1px solid var(--border); color:var(--cream);
    padding:7px 10px; border-radius:14px; font-family:'Lora',serif; font-size:0.82rem;
  }
  .tag-manager-btn{
    background:var(--paper-raised); border:1px solid var(--border); color:var(--sage);
    padding:7px 10px; border-radius:8px; font-size:0.52rem; cursor:pointer; font-family:'Press Start 2P', monospace;
  }
  .tag-manager-delete{color:#e09b98;}

  /* wrapped view */
  .wrapped-hero{text-align:center; padding:26px 0 10px;}
  .wrapped-year{font-family:'Press Start 2P', monospace; font-size:0.6rem; color:var(--amber-dim); letter-spacing:0.06em; text-transform:uppercase; line-height:1.8;}
  .wrapped-title{font-family:'Silkscreen', monospace; font-weight:700; font-size:1.4rem; color:var(--cream); margin-top:8px; line-height:1.6;}
  .wrapped-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:26px 0;}
  .wrapped-stat{background:var(--paper); border-radius:12px; padding:18px 16px; border:2px solid var(--paper-raised);}
  .wrapped-stat-num{font-family:'Cormorant Garamond',serif; font-size:2.1rem; color:var(--amber); line-height:1;}
  .wrapped-stat-num.pixel{font-size:1.3rem; line-height:1.4;}
  .wrapped-stat-label{font-family:'Press Start 2P', monospace; font-size:0.5rem; color:var(--cream-dim); text-transform:uppercase; letter-spacing:0.02em; margin-top:8px; line-height:1.6;}
  .wrapped-section{margin:30px 0;}
  .wrapped-section-title{font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.2rem; color:var(--amber-dim); margin-bottom:14px;}
  .month-bars{display:flex; align-items:flex-end; gap:5px; height:90px;}
  .month-bar-wrap{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;}
  .month-bar{width:100%; background:linear-gradient(var(--amber), var(--plum)); border-radius:3px 3px 0 0; min-height:2px;}
  .month-label{font-family:'Press Start 2P', monospace; font-size:0.5rem; color:var(--cream-dim); margin-top:8px;}
  .mood-bar-row{display:flex; align-items:center; gap:10px; margin-bottom:8px; font-size:0.85rem;}
  .mood-bar-track{flex:1; height:8px; background:var(--paper); border-radius:4px; overflow:hidden;}
  .mood-bar-fill{height:100%; background:var(--sage);}
  .mood-bar-count{font-family:'Press Start 2P', monospace; font-size:0.55rem; color:var(--cream-dim); width:28px; text-align:right;}
  .year-picker{display:flex; gap:6px; justify-content:center; margin-bottom:6px;}
  .year-pill{background:var(--paper); border:1px solid var(--border); color:var(--cream-dim); padding:6px 11px; border-radius:8px; font-family:'Press Start 2P', monospace; font-size:0.55rem; cursor:pointer;}
  .year-pill.active{background:rgba(var(--amber-rgb),0.18); border-color:var(--amber-dim); color:var(--amber);}

  .mode-toggle{display:flex; gap:6px; justify-content:center; margin:18px 0 20px;}
  .month-picker{display:flex; flex-wrap:wrap; gap:5px; justify-content:center; margin-bottom:18px;}

  .harvest-card{
    background:
      radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px) 0 0/16px 16px,
      var(--paper);
    border-radius:10px; padding:24px 20px 20px; position:relative;
    box-shadow:0 6px 22px rgba(10,6,14,0.35); border:3px solid var(--paper-raised);
    margin-bottom:20px;
  }
  .harvest-card::before{
    content:'🌾'; position:absolute; top:-12px; left:-8px; font-size:1.4rem;
    transform:rotate(-14deg); filter:drop-shadow(0 2px 2px rgba(0,0,0,0.35));
  }
  .harvest-card::after{
    content:'🍄'; position:absolute; top:-11px; right:-6px; font-size:1.2rem;
    transform:rotate(16deg); filter:drop-shadow(0 2px 2px rgba(0,0,0,0.35));
  }
  body.season-spring .harvest-card::before{ content:'🌷'; }
  body.season-spring .harvest-card::after{ content:'🌸'; }
  body.season-summer .harvest-card::before{ content:'🌻'; }
  body.season-summer .harvest-card::after{ content:'🦋'; }
  body.season-fall .harvest-card::before{ content:'🌾'; }
  body.season-fall .harvest-card::after{ content:'🍂'; }
  body.season-winter .harvest-card::before{ content:'❄️'; }
  body.season-winter .harvest-card::after{ content:'⛄'; }
  .harvest-header{text-align:center; margin-bottom:20px;}
  .harvest-title{font-family:'Silkscreen', monospace; font-weight:700; font-size:1.1rem; color:var(--amber); line-height:1.6;}
  .harvest-sub{font-family:'Press Start 2P', monospace; font-size:0.5rem; color:var(--cream-dim); margin-top:8px; line-height:1.7;}

  .mini-month-grid{
    display:grid; grid-template-columns:repeat(7, 1fr); gap:4px; margin:20px 0;
  }
  .mini-cell{
    aspect-ratio:1; display:flex; align-items:center; justify-content:center;
    border-radius:5px; font-family:'Press Start 2P', monospace; font-size:0.42rem;
    color:var(--cream-dim); background:rgba(255,255,255,0.06);
  }
  .mini-cell.empty{background:transparent;}
  .mini-cell.level-0{background:rgba(255,255,255,0.06); color:var(--cream-dim);}
  .mini-cell.level-1{background:rgba(var(--sage-rgb),0.35); color:var(--cream);}
  .mini-cell.level-2{background:rgba(var(--sage-rgb),0.6); color:var(--cream);}
  .mini-cell.level-3{background:rgba(var(--sage-rgb),0.85); color:var(--cream);}
  .mini-cell.level-4{background:var(--sage); color:var(--cream);}

  .weather-tally{display:flex; flex-wrap:wrap; gap:7px;}
  .weather-chip{
    background:var(--paper-raised); border:1px solid var(--border); color:var(--cream-dim);
    padding:6px 11px; border-radius:14px; font-size:0.8rem; font-family:'Lora',serif;
  }

  .highlight-entry{background:var(--paper-raised); border-radius:12px; padding:14px 16px;}
  .highlight-date{font-family:'Press Start 2P', monospace; font-size:0.48rem; color:var(--amber-dim); margin-bottom:8px; line-height:1.6;}
  .highlight-text{font-family:'Caveat', cursive; font-size:1.15rem; color:var(--cream-dim); line-height:1.5;}

  .sprout-line{
    display:flex; align-items:center; gap:8px; justify-content:center; margin-top:22px;
    padding-top:18px; border-top:2px dashed var(--border);
    font-family:'Press Start 2P', monospace; font-size:0.48rem; color:var(--cream-dim); line-height:1.8; text-align:center;
  }

  .achievement-toast{
    position:fixed; left:50%; bottom:-100px; transform:translateX(-50%);
    display:flex; align-items:center; gap:12px; background:var(--paper);
    border:3px solid var(--amber-dim); border-radius:12px; padding:14px 18px;
    box-shadow:0 8px 26px rgba(10,6,14,0.5); z-index:1000; max-width:88vw;
    transition:bottom 0.4s ease, opacity 0.4s ease; opacity:0;
  }
  .achievement-toast.show{ bottom:24px; opacity:1; }
  .achievement-toast-icon{ font-size:1.6rem; animation:spriteBob 1.2s ease-in-out infinite; }
  .achievement-toast-text{ font-family:'Press Start 2P', monospace; font-size:0.5rem; color:var(--cream); line-height:1.8; }

  .trophy-grid{display:grid; grid-template-columns:repeat(4, 1fr); gap:10px; margin:16px 0 4px;}
  .trophy{
    display:flex; flex-direction:column; align-items:center; gap:6px; padding:10px 4px;
    background:var(--paper); border-radius:10px; border:2px solid var(--paper-raised);
  }
  .trophy.locked{opacity:0.35;}
  .trophy-icon{font-size:1.3rem;}
  .trophy-label{font-family:'Press Start 2P', monospace; font-size:0.38rem; color:var(--cream-dim); text-align:center; line-height:1.5;}

  .heatmap-wrap{overflow-x:auto; padding-bottom:4px;}
  .heatmap-months{display:grid; grid-auto-flow:column; grid-auto-columns:13px; margin-bottom:4px;}
  .heatmap-month-label{font-family:'Press Start 2P', monospace; font-size:0.42rem; color:var(--cream-dim); white-space:nowrap;}
  .heatmap{display:grid; grid-template-rows:repeat(7, 11px); grid-auto-flow:column; grid-auto-columns:11px; gap:2px;}
  .heatmap-cell{width:11px; height:11px; border-radius:2px; background:rgba(255,255,255,0.04);}
  .heatmap-cell.level-out{background:transparent;}

// Safe storage: falls back to an in-memory store if localStorage is blocked
// (can happen in some "Add to Home Screen" contexts on iOS)
function makeSafeStorage(){
  try {
    const testKey = "__qh_test__";
    window.localStorage.setItem(testKey, "1");
    window.localStorage.removeItem(testKey);
    return window.localStorage;
  } catch (e) {
    console.warn("localStorage unavailable, using in-memory fallback:", e);
    const mem = {};
    return {
      getItem: k => (k in mem ? mem[k] : null),
      setItem: (k,v) => { mem[k] = v; },
      removeItem: k => { delete mem[k]; }
    };
  }
}

function computeStreak(){
  const dates = new Set(entries.filter(e => e.content && e.content.trim()).map(e => e.entry_date));
  let streak = 0;
  let cursor = new Date();
  // if today not written yet, start counting from yesterday
  if (!dates.has(todayStr())) cursor.setDate(cursor.getDate()-1);
  while (true){
    const ds = cursor.getFullYear()+"-"+String(cursor.getMonth()+1).padStart(2,"0")+"-"+String(cursor.getDate()).padStart(2,"0");
    if (dates.has(ds)){ streak++; cursor.setDate(cursor.getDate()-1); }
    else break;
  }
  return streak;
}

function onThisDayEntries(){
  const now = new Date();
  const mm = String(now.getMonth()+1).padStart(2,"0");
  const dd = String(now.getDate()).padStart(2,"0");
  return entries.filter(e => {
    const [,m,d] = e.entry_date.split("-");
    return m === mm && d === dd && e.entry_date !== todayStr() && e.content && e.content.trim();
  });
}

async function saveEntry(){
  const status = document.getElementById("saveStatus");

  const content = textEl ? textEl.value : (entries.find(e => e.entry_date === todayStr())?.content || "");
  if (status) status.textContent = "saving...";
  const date = todayStr();
  const existing = entries.find(e => e.entry_date === date);
  const moodStr = selectedMoods.size ? Array.from(selectedMoods).join(", ") : null;
  const payload = {
    user_id: session.user.id,
    entry_date: date,
    content,
    mood: moodStr,
    weather: selectedWeather,
    tags: Array.from(selectedTags)
  };
  let error, data;
  if (existing){
    ({ error } = await sb.from("entries").update(payload).eq("id", existing.id));
    if (!error) Object.assign(existing, payload);
  } else {
    ({ data, error } = await sb.from("entries").insert(payload).select().single());
    if (!error && data) entries.unshift(data);
  }
  const liveStatus = document.getElementById("saveStatus");
  if (liveStatus){
    liveStatus.textContent = error
      ? "couldn't save — try again"
      : "saved · " + new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  }
  renderStreak();
  if (!error) checkAchievements();
}

function computeAchievementStats(){
  const written = entries.filter(e => e.content && e.content.trim());
  const totalEntries = written.length;
  const allDates = new Set(written.map(e => e.entry_date));
  const longestStreakEver = computeLongestStreak(allDates);
  const maxEntryWords = written.reduce((max,e) => Math.max(max, e.content.trim().split(/\s+/).filter(Boolean).length), 0);
  const hasTags = written.some(e => e.tags && e.tags.length);
  const hasMood = written.some(e => e.mood);
  const spriteStageIdx = getSpriteStage(totalEntries).idx;
  return { totalEntries, longestStreakEver, maxEntryWords, hasTags, hasMood, spriteStageIdx };
}

async function checkAchievements(){
  const stats = computeAchievementStats();
  const newlyUnlocked = [];
  ACHIEVEMENTS.forEach(a => {
    if (!unlockedAchievements.has(a.id) && a.check(stats)){
      unlockedAchievements.add(a.id);
      newlyUnlocked.push(a);
    }
  });
  if (newlyUnlocked.length){
    const { error } = await sb.from("user_settings").upsert({ user_id: session.user.id, unlocked_achievements: Array.from(unlockedAchievements) });
    if (error){
      console.error("Failed to save achievements, will retry next check:", error);
      // roll back so these get re-evaluated (and re-saved) on the next check instead of
      // being shown as unlocked locally while never actually persisted
      newlyUnlocked.forEach(a => unlockedAchievements.delete(a.id));
      return;
    }
    newlyUnlocked.forEach(a => queueToast(a));
  }
}

function queueToast(achievement){

function showNextToast(){
  if (toastShowing || !toastQueue.length) return;

  document.body.appendChild(el);
  requestAnimationFrame(() => el.classList.add("show"));
  setTimeout(() => {
    el.classList.remove("show");
    setTimeout(() => { el.remove(); toastShowing = false; showNextToast(); }, 400);

}

function getSpriteStage(totalEntries){
  let idx = 0;
  for (let i = 0; i < SPRITE_STAGES.length; i++){
    if (totalEntries >= SPRITE_STAGES[i].min) idx = i;
  }
  return { ...SPRITE_STAGES[idx], idx, next: SPRITE_STAGES[idx+1] || null };
}

function spriteCaption(stage, totalEntries){
  if (!stage.next) return `${spriteName} has reached Full Bloom 🌾`;
  const remaining = stage.next.min - totalEntries;
  return `${spriteName} the ${stage.name} · ${remaining} ${remaining===1?"entry":"entries"} to ${stage.next.name}`;
}

function heatLevel(words){
  if (!words) return 0;
  if (words < 50) return 1;

}

function buildHeatmapWeeks(year, wordsByDate){
  const start = new Date(year, 0, 1);
  const end = new Date(year, 11, 31);
  const gridStart = new Date(start);
  gridStart.setDate(gridStart.getDate() - gridStart.getDay());
  const weeks = [];
  let cur = new Date(gridStart);
  while (cur <= end){
    const week = [];
    for (let d = 0; d < 7; d++){
      const ds = cur.getFullYear()+"-"+String(cur.getMonth()+1).padStart(2,"0")+"-"+String(cur.getDate()).padStart(2,"0");
      week.push({ date: ds, inYear: cur.getFullYear() === year, words: wordsByDate[ds] || 0, isFirstOfMonth: cur.getDate() === 1 });
      cur.setDate(cur.getDate()+1);
    }
    weeks.push(week);
  }
  return weeks;
}

function computeLongestStreak(dates){
  const sorted = Array.from(dates).sort();
  let longest = 0, current = 0, prevDate = null;
  for (const ds of sorted){
    const d = new Date(ds);
    if (prevDate){
      const diffDays = Math.round((d - prevDate) / 86400000);
      current = diffDays === 1 ? current + 1 : 1;
    } else {
      current = 1;
    }
    longest = Math.max(longest, current);
    prevDate = d;
  }
  return longest;
}

let wrappedMode = "year";
let wrappedMonth = null;

function renderWrapped(){
  const written = entries.filter(e => e.content && e.content.trim());
  if (!written.length){
    return `<div class="empty-state">Write a few entries and your journal will start taking shape here.</div>`;
  }
  const years = Array.from(new Set(written.map(e => e.entry_date.slice(0,4)))).sort().reverse();
  if (!wrappedYear || !years.includes(wrappedYear)) wrappedYear = years[0];
  if (!wrappedMonth) wrappedMonth = new Date().getMonth() + 1;

  return `
    <div class="wrapped-hero">
      <div class="wrapped-year">${wrappedMode === "year" ? "Your year in" : "Your month in"}</div>
      <div class="wrapped-title">The Quiet Hours</div>
    </div>

    <div class="wrapped-section">
      <div class="wrapped-section-title">🏆 Trophy Case</div>
      <div class="trophy-grid">
        ${ACHIEVEMENTS.map(a => `
          <div class="trophy ${unlockedAchievements.has(a.id) ? "" : "locked"}">
            <div class="trophy-icon">${unlockedAchievements.has(a.id) ? a.icon : "🔒"}</div>
            <div class="trophy-label">${a.label}</div>
          </div>
        `).join("")}
      </div>
    </div>

    <div class="mode-toggle">
      <span class="year-pill ${wrappedMode==='year'?'active':''}" data-mode="year">🌾 Year</span>
      <span class="year-pill ${wrappedMode==='month'?'active':''}" data-mode="month">🧺 Month</span>
    </div>
    ${wrappedMode === "year" ? renderYearWrapped(written, years) : renderMonthlyRecap(written, years)}
  `;
}

function renderYearWrapped(written, years){
  const yearEntries = written.filter(e => e.entry_date.startsWith(wrappedYear));
  if (!yearEntries.length){
    return `
      <div class="year-picker">${years.map(y => `<span class="year-pill ${y===wrappedYear?'active':''}" data-year="${y}">${y}</span>`).join("")}</div>
      <div class="empty-state">No entries yet for ${wrappedYear}.</div>
    `;
  }

  const totalWords = yearEntries.reduce((sum,e) => sum + e.content.trim().split(/\s+/).filter(Boolean).length, 0);
  const dates = new Set(yearEntries.map(e => e.entry_date));
  const longestStreak = computeLongestStreak(dates);

  const moodCounts = {};
  yearEntries.forEach(e => {
    if (e.mood) e.mood.split(", ").forEach(m => { moodCounts[m] = (moodCounts[m]||0)+1; });
  });
  const topMoods = Object.entries(moodCounts).sort((a,b) => b[1]-a[1]).slice(0,5);
  const maxMoodCount = topMoods.length ? topMoods[0][1] : 1;

  const monthCounts = Array(12).fill(0);
  yearEntries.forEach(e => { monthCounts[parseInt(e.entry_date.slice(5,7),10)-1]++; });
  const maxMonthCount = Math.max(...monthCounts, 1);
  const monthLabels = ["J","F","M","A","M","J","J","A","S","O","N","D"];

  const wordsByDate = {};
  yearEntries.forEach(e => { wordsByDate[e.entry_date] = e.content.trim().split(/\s+/).filter(Boolean).length; });
  const heatWeeks = buildHeatmapWeeks(parseInt(wrappedYear,10), wordsByDate);

  return `
    ${years.length > 1 ? `<div class="year-picker">${years.map(y => `<span class="year-pill ${y===wrappedYear?'active':''}" data-year="${y}">${y}</span>`).join("")}</div>` : ""}

        </div>
        <div class="heatmap">

              ? `<div class="heatmap-cell level-${heatLevel(day.words)}" data-date="${day.date}" data-words="${day.words}" title="${day.date} · ${day.words} words"></div>`

    <div class="wrapped-grid">

            <div class="month-label">${monthLabels[i]}</div>

    </div>

            <span class="mood-bar-count">${c}</span>

    ` : ""}
  `;
}

function buildMonthGrid(year, month, wordsByDate){
  const daysInMonth = new Date(year, month, 0).getDate();
  const firstWeekday = new Date(year, month-1, 1).getDay();
  const cells = [];
  for (let i = 0; i < firstWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++){
    const ds = year+"-"+String(month).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    cells.push({ date: ds, day: d, words: wordsByDate[ds] || 0 });
  }
  return cells;
}

function renderMonthlyRecap(written, years){
  const yearNum = parseInt(wrappedYear, 10);
  const monthPrefix = wrappedYear + "-" + String(wrappedMonth).padStart(2,"0");
  const monthEntries = written.filter(e => e.entry_date.startsWith(monthPrefix));
  const daysInMonth = new Date(yearNum, wrappedMonth, 0).getDate();
  const monthName = new Date(yearNum, wrappedMonth-1, 1).toLocaleDateString('en-US', {month:'long'});

  const pickerRow = `
    ${years.length > 1 ? `<div class="year-picker">${years.map(y => `<span class="year-pill ${y===wrappedYear?'active':''}" data-year="${y}">${y}</span>`).join("")}</div>` : ""}
    <div class="month-picker">
      ${MONTH_ABBR.map((m,i) => `<span class="year-pill ${(i+1)===wrappedMonth?'active':''}" data-monthnum="${i+1}">${m}</span>`).join("")}
    </div>
  `;

  if (!monthEntries.length){
    return `${pickerRow}<div class="empty-state">🌱 Nothing planted yet in ${monthName} ${wrappedYear}.</div>`;
  }

  const totalWords = monthEntries.reduce((sum,e) => sum + e.content.trim().split(/\s+/).filter(Boolean).length, 0);
  const dates = new Set(monthEntries.map(e => e.entry_date));
  const longestStreak = computeLongestStreak(dates);

  const moodCounts = {};
  monthEntries.forEach(e => { if (e.mood) e.mood.split(", ").forEach(m => { moodCounts[m]=(moodCounts[m]||0)+1; }); });
  const topMoods = Object.entries(moodCounts).sort((a,b) => b[1]-a[1]);
  const maxMoodCount = topMoods.length ? topMoods[0][1] : 1;

  const weatherCounts = {};
  monthEntries.forEach(e => { if (e.weather) weatherCounts[e.weather] = (weatherCounts[e.weather]||0)+1; });
  const topWeather = Object.entries(weatherCounts).sort((a,b) => b[1]-a[1]);

  const tagCounts = {};
  monthEntries.forEach(e => { (e.tags||[]).forEach(t => { tagCounts[t]=(tagCounts[t]||0)+1; }); });
  const topTags = Object.entries(tagCounts).sort((a,b) => b[1]-a[1]).slice(0,8);

  const longestEntry = monthEntries.reduce((a,b) => {
    const aw = a.content.trim().split(/\s+/).filter(Boolean).length;
    const bw = b.content.trim().split(/\s+/).filter(Boolean).length;
    return bw > aw ? b : a;
  });
  const longestEntryWords = longestEntry.content.trim().split(/\s+/).filter(Boolean).length;

  const wordsByDate = {};
  monthEntries.forEach(e => { wordsByDate[e.entry_date] = e.content.trim().split(/\s+/).filter(Boolean).length; });
  const monthCells = buildMonthGrid(yearNum, wrappedMonth, wordsByDate);

  const monthStartStr = monthPrefix + "-01";
  const entriesBeforeMonth = written.filter(e => e.entry_date < monthStartStr).length;
  const entriesThroughMonth = entriesBeforeMonth + monthEntries.length;
  const stageBefore = getSpriteStage(entriesBeforeMonth);
  const stageAfter = getSpriteStage(entriesThroughMonth);
  const sproutLine = stageBefore.idx !== stageAfter.idx
    ? `${spriteName} grew from ${stageBefore.name} to ${stageAfter.name} this month! ${renderSpriteHTML(24, stageAfter.idx)}`
    : `${spriteName} is currently a ${stageAfter.name} ${renderSpriteHTML(24, stageAfter.idx)}`;

  return `
    ${pickerRow}

    <div class="harvest-card">
      <div class="harvest-header">
        <div class="harvest-title">🧺 ${monthName} Harvest</div>
        <div class="harvest-sub">${monthEntries.length} of ${daysInMonth} days planted</div>
      </div>

      <div class="wrapped-grid">
        <div class="wrapped-stat"><div class="wrapped-stat-num pixel">${monthEntries.length}</div><div class="wrapped-stat-label">entries</div></div>
        <div class="wrapped-stat"><div class="wrapped-stat-num pixel">${totalWords.toLocaleString()}</div><div class="wrapped-stat-label">words</div></div>
        <div class="wrapped-stat"><div class="wrapped-stat-num pixel">${longestStreak}</div><div class="wrapped-stat-label">longest streak</div></div>
        <div class="wrapped-stat"><div class="wrapped-stat-num">${topMoods[0] ? topMoods[0][0] : "—"}</div><div class="wrapped-stat-label">top mood</div></div>
      </div>

      <div class="mini-month-grid">
        ${monthCells.map(c => c ? `<div class="mini-cell level-${heatLevel(c.words)}" data-date="${c.date}" data-words="${c.words}" title="${c.date} · ${c.words} words">${c.day}</div>` : `<div class="mini-cell empty"></div>`).join("")}
      </div>
      <div class="heatmap-tap-info" id="monthHeatmapInfo">tap a day to see that day's word count</div>

      ${topMoods.length ? `
        <div class="wrapped-section">
          <div class="wrapped-section-title">Moods this month</div>
          ${topMoods.map(([m,c]) => `
            <div class="mood-bar-row">
              <span>${m}</span>
              <div class="mood-bar-track"><div class="mood-bar-fill" style="width:${(c/maxMoodCount)*100}%"></div></div>
              <span class="mood-bar-count">${c}</span>
            </div>
          `).join("")}
        </div>
      ` : ""}

      ${topWeather.length ? `
        <div class="wrapped-section">
          <div class="wrapped-section-title">Weather this month</div>
          <div class="weather-tally">
            ${topWeather.map(([w,c]) => `<span class="weather-chip">${w} ×${c}</span>`).join("")}
          </div>
        </div>
      ` : ""}

      ${topTags.length ? `
        <div class="wrapped-section">
          <div class="wrapped-section-title">Top tags</div>
          <div class="weather-tally">
            ${topTags.map(([t,c]) => `<span class="weather-chip">${t} ×${c}</span>`).join("")}
          </div>
        </div>
      ` : ""}

      <div class="wrapped-section">
        <div class="wrapped-section-title">Longest entry</div>
        <div class="highlight-entry">
          <div class="highlight-date">${new Date(longestEntry.entry_date).toLocaleDateString('en-US',{month:'short',day:'numeric'})} · ${longestEntryWords} words</div>
          <div class="highlight-text">${longestEntry.content.slice(0,240)}${longestEntry.content.length>240?"…":""}</div>
        </div>
      </div>

      <div class="sprout-line">${sproutLine}</div>
    </div>
  `;
}

function render(){
  if (!session){
    renderAuth();
    return;
  }
  if (!entries.length && !entriesLoaded) {
    loadEntries().then(render);
  }
  if (!settingsLoaded) {
    loadSettings().then(render);
  }
  if (entriesLoaded && settingsLoaded && !achievementsCheckedOnLoad){
    achievementsCheckedOnLoad = true;
    checkAchievements();
  }
  const app = document.getElementById("app");
  app.innerHTML = `
    <header>
      <div class="wordmark">The Quiet Hours <span class="flourish">✨</span></div>
      <nav>
        <button id="navToday" class="${currentView==='today'?'active':''}">Today</button>
        <button id="navArchive" class="${currentView==='archive'?'active':''}">Archive</button>
        <button id="navWrapped" class="${currentView==='wrapped'?'active':''}">Wrapped</button>
      </nav>
    </header>
    <main id="mainContent">
      ${currentView === 'today' ? renderToday() : currentView === 'archive' ? renderArchive() : renderWrapped()}
    </main>
  `;

  document.getElementById("navToday").addEventListener("click", () => { currentView="today"; render(); });
  document.getElementById("navArchive").addEventListener("click", () => { currentView="archive"; render(); });
  document.getElementById("navWrapped").addEventListener("click", () => { currentView="wrapped"; render(); });

  if (currentView === "today"){
    document.getElementById("entryText").addEventListener("input", scheduleSave);
    document.getElementById("entryText").addEventListener("focus", () => {
      const ta = document.getElementById("entryText");
      if (!timestampMarkerAdded && originalContentAtLoad.trim().length > 0 && ta.value === originalContentAtLoad){
        const time = new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
        ta.value = ta.value.replace(/\s+$/,'') + "\n\n— " + time + " —\n\n";
        ta.setSelectionRange(ta.value.length, ta.value.length);
        timestampMarkerAdded = true;
        scheduleSave();
      }
    });
    document.getElementById("promptChip").addEventListener("click", insertPrompt);
    const renameSpriteBtn = document.getElementById("renameSpriteBtn");
    if (renameSpriteBtn) renameSpriteBtn.addEventListener("click", () => { spriteRenameOpen = !spriteRenameOpen; render(); });
    const saveSpriteNameBtn = document.getElementById("saveSpriteNameBtn");
    if (saveSpriteNameBtn) saveSpriteNameBtn.addEventListener("click", () => {
      const input = document.getElementById("spriteNameInput");
      spriteRenameOpen = false;
      saveSpriteName(input.value);
    });
    document.querySelectorAll("#moodOptions .tag-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const m = btn.dataset.mood;
        if (selectedMoods.has(m)){ selectedMoods.delete(m); btn.classList.remove("selected"); }
        else { selectedMoods.add(m); btn.classList.add("selected"); }
        scheduleSave();
      });
    });
    const editMoodsBtn = document.getElementById("editMoodsBtn");
    if (editMoodsBtn) editMoodsBtn.addEventListener("click", () => { moodManagerOpen = !moodManagerOpen; render(); });
    document.querySelectorAll('[data-action="save-mood"]').forEach(btn => {
      btn.addEventListener("click", () => {
        const idx = parseInt(btn.dataset.index, 10);
        const input = document.querySelector(`.mood-rename-input[data-index="${idx}"]`);
        renameMood(idx, input.value);
      });
    });
    document.querySelectorAll('[data-action="delete-mood"]').forEach(btn => {
      btn.addEventListener("click", () => { deleteMood(parseInt(btn.dataset.index, 10)); });
    });
    const addMoodBtn = document.getElementById("addMoodBtn");
    if (addMoodBtn) addMoodBtn.addEventListener("click", () => {
      const input = document.getElementById("newMoodInput");
      addMood(input.value);
    });
    const resetMoodsBtn = document.getElementById("resetMoodsBtn");
    if (resetMoodsBtn) resetMoodsBtn.addEventListener("click", resetMoods);
    document.querySelectorAll("#weatherOptions .tag-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const w = btn.dataset.weather;
        const wasSelected = selectedWeather === w;
        document.querySelectorAll("#weatherOptions .tag-btn").forEach(b => b.classList.remove("selected"));
        selectedWeather = wasSelected ? null : w;
        if (selectedWeather) btn.classList.add("selected");
        scheduleSave();
      });
    });

    const addTag = () => {
      const input = document.getElementById("tagInput");
      const val = input.value.trim().toLowerCase();
      if (!val) return;
      selectedTags.add(val);
      input.value = "";
      renderChipList();
      scheduleSave();
    };
    document.getElementById("addTagBtn").addEventListener("click", addTag);
    document.getElementById("tagInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter"){ e.preventDefault(); addTag(); }
    });
    document.querySelectorAll("#chipList .chip button").forEach(btn => {
      btn.addEventListener("click", () => {
        selectedTags.delete(btn.dataset.tag);
        renderChipList();
        scheduleSave();
      });
    });
  } else if (currentView === "archive") {
    document.querySelectorAll(".archive-item").forEach(item => {
      item.addEventListener("click", () => {
        currentView = "today";
        const date = item.dataset.date;
        openEntry(date);
      });
    });
    document.querySelectorAll(".filter-pill[data-tag]").forEach(pill => {
      pill.addEventListener("click", (e) => {
        e.stopPropagation();
        archiveTagFilter = archiveTagFilter === pill.dataset.tag ? null : pill.dataset.tag;
        render();
      });
    });
    const clearBtn = document.getElementById("clearFilter");
    if (clearBtn) clearBtn.addEventListener("click", (e) => { e.stopPropagation(); archiveTagFilter = null; render(); });
    const manageBtn = document.getElementById("manageTagsBtn");
    if (manageBtn) manageBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      tagManagerOpen = !tagManagerOpen;
      render();
    });
    document.querySelectorAll(".tag-manager-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const old = btn.dataset.old;
        if (btn.dataset.action === "delete"){
          deleteTagGlobally(old);
        } else {
          const input = document.querySelector(`.tag-rename-input[data-old="${old}"]`);
          renameTagGlobally(old, input.value);
        }
      });
    });
  } else if (currentView === "wrapped") {
    document.querySelectorAll(".year-pill[data-year]").forEach(pill => {
      pill.addEventListener("click", () => { wrappedYear = pill.dataset.year; render(); });
    });
    document.querySelectorAll(".year-pill[data-monthnum]").forEach(pill => {
      pill.addEventListener("click", () => { wrappedMonth = parseInt(pill.dataset.monthnum, 10); render(); });
    });
    document.querySelectorAll(".year-pill[data-mode]").forEach(pill => {
      pill.addEventListener("click", () => { wrappedMode = pill.dataset.mode; render(); });
    });
    const cellInfoText = (ds, words) => {
      const [y,m,d] = ds.split("-").map(Number);
      const label = new Date(y, m-1, d).toLocaleDateString('en-US', {month:'short', day:'numeric'});
      return `${label} · ${words} ${words === 1 ? "word" : "words"}`;
    };
    document.querySelectorAll(".heatmap-cell[data-date]").forEach(cell => {
      cell.addEventListener("click", () => {
        const info = document.getElementById("yearHeatmapInfo");
        if (info) info.textContent = cellInfoText(cell.dataset.date, cell.dataset.words);
      });
    });
    document.querySelectorAll(".mini-cell[data-date]").forEach(cell => {
      cell.addEventListener("click", () => {
        const info = document.getElementById("monthHeatmapInfo");
        if (info) info.textContent = cellInfoText(cell.dataset.date, cell.dataset.words);
      });
    });
  }
}

async function renameTagGlobally(oldTag, newTagRaw){
  const newTag = newTagRaw.trim().toLowerCase();
  if (!newTag || newTag === oldTag) return;
  const affected = entries.filter(e => (e.tags||[]).includes(oldTag));
  for (const e of affected){
    const newTags = Array.from(new Set(e.tags.map(t => t === oldTag ? newTag : t)));
    const { error } = await sb.from("entries").update({ tags: newTags }).eq("id", e.id);
    if (!error) e.tags = newTags;
  }
  if (archiveTagFilter === oldTag) archiveTagFilter = newTag;
  render();
}

async function deleteTagGlobally(tag){
  const affected = entries.filter(e => (e.tags||[]).includes(tag));
  for (const e of affected){
    const newTags = e.tags.filter(t => t !== tag);
    const { error } = await sb.from("entries").update({ tags: newTags }).eq("id", e.id);
    if (!error) e.tags = newTags;
  }
  if (archiveTagFilter === tag) archiveTagFilter = null;
  render();
}

function renderChipList(){
  const list = document.getElementById("chipList");
  if (!list) return;
  list.innerHTML = Array.from(selectedTags).map(t => `<span class="chip">${t}<button data-tag="${t}">×</button></span>`).join("");
  list.querySelectorAll("button").forEach(btn => {
    btn.addEventListener("click", () => {
      selectedTags.delete(btn.dataset.tag);
      renderChipList();
      scheduleSave();
    });
  });
}

let viewingDate = null;
function openEntry(date){
  viewingDate = date;
  const entry = entries.find(e => e.entry_date === date);
  const app = document.getElementById("app");
  app.innerHTML = `
    <header>
      <div class="wordmark">The Quiet Hours <span class="flourish">✨</span></div>
      <nav><button id="backBtn">← Back to Archive</button></nav>
    </header>
    <main>
      <div class="date-line">${fmtDate(date)}</div>
      <textarea id="entryTextView" placeholder="Write whatever's on your mind...">${entry ? entry.content : ""}</textarea>
      <div class="save-row"><div class="save-status" id="saveStatusView">saved</div></div>
    </main>
  `;
  document.getElementById("backBtn").addEventListener("click", () => { currentView="archive"; viewingDate=null; render(); });
  let t = null;
  document.getElementById("entryTextView").addEventListener("input", (e) => {
    clearTimeout(t);
    document.getElementById("saveStatusView").textContent = "typing...";
    t = setTimeout(async () => {
      const existing = entries.find(x => x.entry_date === date);
      const { error } = await sb.from("entries").update({ content: e.target.value }).eq("id", existing.id);
      document.getElementById("saveStatusView").textContent = error ? "couldn't save" : "saved";
      if (!error) await loadEntries();
    }, 1200);
  });
}

if (sb) init();
</script>
