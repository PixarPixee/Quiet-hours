<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>The Quiet Hours</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Quiet Hours">
<meta name="theme-color" content="#241b2e">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&family=Press+Start+2P&family=Silkscreen:wght@400;700&family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#241b2e;
    --paper:#2f2438;
    --paper-raised:#3a2d46;
    --cream:#ede3f0;
    --cream-dim:#c3b3cc;
    --amber:#d98fa3;
    --amber-dim:#c2748c;
    --plum:#a78bc4;
    --sage:#8fae82;
    --border:rgba(237,227,240,0.1);
  }
  .pixel{font-family:'Press Start 2P', monospace;}
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--cream);
    font-family:'Lora',serif;
    min-height:100vh;
    min-height:100dvh;
    overflow-x:hidden;
    position:relative;
  }

  /* lamplight signature */
  .lamplight{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
    background:radial-gradient(ellipse 60% 45% at 50% 28%, rgba(217,143,163,0.16), rgba(217,143,163,0.06) 40%, rgba(36,27,46,0) 70%);
    animation:flicker 7s ease-in-out infinite;
  }
  @keyframes flicker{
    0%,100%{opacity:1;}
    45%{opacity:0.85;}
    50%{opacity:1;}
    72%{opacity:0.92;}
  }
  @media (prefers-reduced-motion: reduce){
    .lamplight{animation:none;}
  }

  #app{position:relative; z-index:1; max-width:640px; margin:0 auto; padding:env(safe-area-inset-top,0) 20px calc(env(safe-area-inset-bottom,0) + 20px);}

  /* ---- auth screen ---- */
  .auth-screen{
    min-height:100vh; min-height:100dvh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:18px; padding:20px;
  }
  .auth-title{font-family:'Silkscreen', monospace; font-weight:700; font-size:1.6rem; color:var(--cream); letter-spacing:0.01em; line-height:1.6;}
  .auth-sub{color:var(--cream-dim); font-size:0.95rem; max-width:320px; line-height:1.6;}
  .auth-form{display:flex; flex-direction:column; gap:12px; width:100%; max-width:320px; margin-top:8px;}
  input[type=email], input[type=password]{
    background:var(--paper); border:1px solid var(--border); color:var(--cream);
    padding:14px 16px; border-radius:10px; font-family:'Lora',serif; font-size:1rem;
  }
  input[type=email]:focus, input[type=password]:focus{outline:2px solid var(--amber-dim); outline-offset:2px;}
  .btn{
    background:var(--amber); color:#211823; border:none; padding:14px 20px;
    border-radius:10px; font-family:'Lora',serif; font-weight:500; font-size:0.95rem;
    cursor:pointer; transition:opacity 0.15s;
  }
  .btn:hover{opacity:0.9;}
  .btn:focus-visible{outline:2px solid var(--cream); outline-offset:2px;}
  .btn-ghost{
    background:transparent; border:1px solid var(--border); color:var(--cream-dim);
  }
  .auth-msg{color:var(--sage); font-size:0.85rem; min-height:1.2em;}

  /* ---- header/nav ---- */
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:22px 0 14px; position:sticky; top:0; z-index:5;
    background:linear-gradient(var(--bg) 70%, transparent);
  }
  .wordmark{font-family:'Silkscreen', monospace; font-weight:700; font-size:0.95rem; color:var(--amber); line-height:1.5; letter-spacing:0.01em;}
  .flourish{font-size:0.85rem; opacity:0.75; margin-left:6px;}

  .page-card{
    background:
      radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px) 0 0/16px 16px,
      var(--paper);
    border-radius:10px; padding:26px 22px 16px; position:relative;
    box-shadow:0 6px 22px rgba(10,6,14,0.35); margin-bottom:6px;
    border:3px solid var(--paper-raised);
  }
  .page-card::before{
    content:'🍄'; position:absolute; top:-11px; left:-8px; font-size:1.3rem;
    transform:rotate(-14deg); filter:drop-shadow(0 2px 2px rgba(0,0,0,0.35));
  }
  .page-card::after{
    content:'⭐'; position:absolute; top:-11px; right:-6px; font-size:1.05rem;
    transform:rotate(16deg); filter:drop-shadow(0 2px 2px rgba(0,0,0,0.35));
  }
  .entry-divider{border-top:2px dashed var(--border); margin:14px 0 16px;}
  .divider{
    text-align:center; color:var(--amber-dim); opacity:0.85; font-size:0.6rem;
    margin:26px 0; letter-spacing:0.3em; animation:twinkle 2.6s ease-in-out infinite;
  }
  @keyframes twinkle{ 0%,100%{opacity:0.55;} 50%{opacity:1;} }
  .sprite-critter{
    display:inline-block; width:28px; height:28px; border-radius:50% 50% 45% 45%;
    background:radial-gradient(circle at 35% 30%, #b3d1a3, var(--sage));
    position:relative; vertical-align:middle; margin-right:6px;
    box-shadow:inset 0 -3px 4px rgba(0,0,0,0.18), 0 1px 3px rgba(0,0,0,0.25);
    animation:spriteBob 2.6s ease-in-out infinite;
  }
  @keyframes spriteBob{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-3px);} }
  @media (prefers-reduced-motion: reduce){ .sprite-critter, .divider{animation:none;} }
  .sprite-critter::before, .sprite-critter::after{
    content:''; position:absolute; width:15%; height:20%; background:#fff;
    border-radius:50%; top:40%;
  }
  .sprite-critter::before{left:25%;}
  .sprite-critter::after{right:25%;}
  nav{display:flex; gap:4px; background:var(--paper); border-radius:10px; padding:3px;}
  nav button{
    background:transparent; border:none; color:var(--cream-dim); padding:9px 12px;
    border-radius:8px; font-family:'Press Start 2P', monospace; font-size:0.55rem; cursor:pointer;
  }
  nav button.active{background:var(--paper-raised); color:var(--amber);}

  /* ---- today page ---- */
  .date-line{font-family:'Press Start 2P', monospace; font-size:0.6rem; letter-spacing:0.04em; color:var(--cream-dim); text-transform:uppercase; margin-bottom:10px; line-height:1.6;}
  .streak{
    display:inline-flex; align-items:center; gap:6px; font-family:'Press Start 2P', monospace;
    font-size:0.55rem; color:var(--amber); margin-bottom:22px; line-height:1.8;
  }
  .streak .pixel{font-size:0.65rem;}

  .prompt-chip{
    display:inline-block; background:var(--paper); border:1px solid var(--border);
    color:var(--cream-dim); font-size:1.15rem; padding:8px 16px; border-radius:20px;
    cursor:pointer; margin-bottom:18px; font-family:'Caveat', cursive; font-weight:600;
    transition:border-color 0.15s;
  }
  .prompt-chip:hover{border-color:var(--amber-dim);}

  textarea{
    width:100%; min-height:44vh; background:transparent; border:none; color:var(--cream);
    font-family:'Lora',serif; font-size:1.08rem; line-height:1.85; resize:vertical;
    padding:0 0 20px; border-bottom:1px solid var(--border);
  }
  textarea::placeholder{color:rgba(237,227,240,0.28); font-style:italic;}
  textarea:focus{outline:none;}

  .tag-row{display:flex; flex-wrap:wrap; gap:8px; margin:18px 0;}
  .tag-group{display:flex; flex-direction:column; gap:6px;}
  .tag-label{font-family:'Press Start 2P', monospace; font-size:0.52rem; color:var(--cream-dim); text-transform:uppercase; letter-spacing:0.02em; line-height:1.6;}
  .edit-link{color:var(--amber-dim); cursor:pointer; text-transform:none; letter-spacing:0; margin-left:6px;}
  .tag-options{display:flex; gap:6px; flex-wrap:wrap;}
  .tag-btn{
    background:var(--paper); border:1px solid var(--border); color:var(--cream-dim);
    padding:6px 11px; border-radius:16px; font-size:0.85rem; cursor:pointer; font-family:'Lora',serif;
    transition:background 0.12s, border-color 0.12s, transform 0.08s;
  }
  .tag-btn:active{transform:scale(0.94);}
  .tag-btn.selected{background:rgba(143,174,130,0.18); border-color:var(--sage); color:var(--cream);}

  /* freeform private tags */
  .private-tags{margin:18px 0;}
  .tag-input-row{display:flex; gap:8px; margin-top:6px;}
  .tag-input-row input{
    flex:1; background:var(--paper); border:1px solid var(--border); color:var(--cream);
    padding:8px 12px; border-radius:16px; font-family:'Lora',serif; font-size:0.85rem;
  }
  .tag-input-row input:focus{outline:1px solid var(--amber-dim);}
  .tag-input-row button{
    background:var(--paper-raised); border:1px solid var(--border); color:var(--amber);
    padding:8px 14px; border-radius:16px; font-size:0.85rem; cursor:pointer; font-family:'Lora',serif;
  }
  .chip-list{display:flex; flex-wrap:wrap; gap:6px; margin-top:10px;}
  .chip{
    display:inline-flex; align-items:center; gap:6px; background:rgba(167,139,196,0.25);
    border:1px solid var(--plum); color:var(--cream); padding:5px 6px 5px 12px;
    border-radius:14px; font-size:0.8rem; font-family:'Lora',serif;
  }
  .chip button{background:none; border:none; color:var(--cream-dim); cursor:pointer; font-size:0.95rem; padding:0 6px; line-height:1;}
  .chip button:hover{color:var(--cream);}

  /* archive filter + tags */
  .filter-bar{display:flex; flex-wrap:wrap; gap:6px; margin:14px 0 4px;}
  .filter-pill{
    background:var(--paper); border:1px solid var(--border); color:var(--cream-dim);
    padding:6px 11px; border-radius:8px; font-size:0.55rem; cursor:pointer; font-family:'Press Start 2P', monospace;
  }
  .filter-pill.active{background:rgba(217,143,163,0.18); border-color:var(--amber-dim); color:var(--amber);}
  .archive-tags{display:flex; flex-wrap:wrap; gap:5px; margin-top:8px;}
  .archive-tag-pill{font-size:0.55rem; font-family:'Press Start 2P', monospace; color:var(--sage); background:rgba(143,174,130,0.12); padding:3px 8px; border-radius:6px;}
  .tag-manager{background:var(--paper); border-radius:12px; padding:14px; margin-bottom:16px; display:flex; flex-direction:column; gap:8px;}
  .tag-manager-row{display:flex; gap:6px; align-items:center;}
  .tag-manager-row input{
    flex:1; background:var(--paper-raised); border:1px solid var(--border); color:var(--cream);
    padding:7px 10px; border-radius:14px; font-family:'Lora',serif; font-size:0.82rem;
  }
  .tag-manager-btn{
    background:var(--paper-raised); border:1px solid var(--border); color:var(--sage);
    padding:7px 10px; border-radius:8px; font-size:0.52rem; cursor:pointer; font-family:'Press Start 2P', monospace;
  }
  .tag-manager-delete{color:#e09b98;}

  /* wrapped view */
  .wrapped-hero{text-align:center; padding:26px 0 10px;}
  .wrapped-year{font-family:'Press Start 2P', monospace; font-size:0.6rem; color:var(--amber-dim); letter-spacing:0.06em; text-transform:uppercase; line-height:1.8;}
  .wrapped-title{font-family:'Silkscreen', monospace; font-weight:700; font-size:1.4rem; color:var(--cream); margin-top:8px; line-height:1.6;}
  .wrapped-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:26px 0;}
  .wrapped-stat{background:var(--paper); border-radius:12px; padding:18px 16px; border:2px solid var(--paper-raised);}
  .wrapped-stat-num{font-family:'Cormorant Garamond',serif; font-size:2.1rem; color:var(--amber); line-height:1;}
  .wrapped-stat-num.pixel{font-size:1.3rem; line-height:1.4;}
  .wrapped-stat-label{font-family:'Press Start 2P', monospace; font-size:0.5rem; color:var(--cream-dim); text-transform:uppercase; letter-spacing:0.02em; margin-top:8px; line-height:1.6;}
  .wrapped-section{margin:30px 0;}
  .wrapped-section-title{font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.2rem; color:var(--amber-dim); margin-bottom:14px;}
  .month-bars{display:flex; align-items:flex-end; gap:5px; height:90px;}
  .month-bar-wrap{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;}
  .month-bar{width:100%; background:linear-gradient(var(--amber), var(--plum)); border-radius:3px 3px 0 0; min-height:2px;}
  .month-label{font-family:'Press Start 2P', monospace; font-size:0.5rem; color:var(--cream-dim); margin-top:8px;}
  .mood-bar-row{display:flex; align-items:center; gap:10px; margin-bottom:8px; font-size:0.85rem;}
  .mood-bar-track{flex:1; height:8px; background:var(--paper); border-radius:4px; overflow:hidden;}
  .mood-bar-fill{height:100%; background:var(--sage);}
  .mood-bar-count{font-family:'Press Start 2P', monospace; font-size:0.55rem; color:var(--cream-dim); width:28px; text-align:right;}
  .year-picker{display:flex; gap:6px; justify-content:center; margin-bottom:6px;}
  .year-pill{background:var(--paper); border:1px solid var(--border); color:var(--cream-dim); padding:6px 11px; border-radius:8px; font-family:'Press Start 2P', monospace; font-size:0.55rem; cursor:pointer;}
  .year-pill.active{background:rgba(217,143,163,0.18); border-color:var(--amber-dim); color:var(--amber);}

  .save-row{display:flex; align-items:center; justify-content:space-between; margin-top:18px; gap:12px;}
  .save-status{font-family:'Press Start 2P', monospace; font-size:0.52rem; color:var(--cream-dim); line-height:1.6;}

  .on-this-day{
    margin-top:38px; padding-top:22px; border-top:1px solid var(--border);
  }
  .oth-title{font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.15rem; color:var(--amber-dim); margin-bottom:10px;}
  .oth-card{
    background:var(--paper); border-radius:10px; padding:14px 16px; margin-bottom:10px;
    font-size:0.9rem; color:var(--cream-dim); line-height:1.6;
  }
  .oth-year{font-family:'DM Mono',monospace; font-size:0.7rem; color:var(--amber-dim); display:block; margin-bottom:4px;}

  /* ---- archive ---- */
  .archive-list{display:flex; flex-direction:column; gap:10px; margin-top:18px;}
  .archive-item{
    background:var(--paper); border-radius:10px; padding:14px 16px; cursor:pointer;
    border:1px solid transparent; transition:border-color 0.15s;
  }
  .archive-item:hover{border-color:var(--border);}
  .archive-date{font-family:'DM Mono',monospace; font-size:0.72rem; color:var(--amber-dim); display:flex; justify-content:space-between;}
  .archive-preview{font-size:0.9rem; color:var(--cream-dim); margin-top:6px; line-height:1.5; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;}
  .empty-state{color:var(--cream-dim); font-size:0.9rem; text-align:center; padding:60px 20px; font-style:italic; font-family:'Cormorant Garamond',serif; font-size:1.2rem;}

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--paper-raised); border-radius:4px;}
</style>
</head>
<body>
<div class="lamplight"></div>
<div id="app"></div>

<script>
const SUPABASE_URL = "https://oeoxmalwkauaiikhqazs.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9lb3htYWx3a2F1YWlpa2hxYXpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMTM1MTIsImV4cCI6MjA5OTY4OTUxMn0.EgVcBXdvMBlPemYp-XDa0Oj5jNDgFCmKa60CdeDCidk";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const PROMPTS = [
  "What's sitting heaviest on your mind right now?",
  "What made you smile today, even briefly?",
  "What are you avoiding thinking about?",
  "What would you tell yourself this morning?",
  "What's one thing you're grateful for tonight?",
  "What surprised you today?",
  "What do you wish someone had asked you today?",
  "What's a small win from today?",
  "What conversation is still echoing in your head?",
  "What are you looking forward to?",
  "What did you learn about yourself this week?",
  "What's something you needed but didn't get today?",
  "Where did you feel most like yourself today?",
  "What's a worry you can set down for tonight?",
  "What would make tomorrow feel lighter?"
];

const DEFAULT_MOODS = ["🌙 calm","🌻 joyful","🍄 dreamy","🐓 restless","🧺 cozy","⛏️ determined","🐛 anxious","🌾 grounded"];
const WEATHERS = ["☀️ sunny","🌦️ showery","⛈️ stormy","❄️ snowy","🌫️ misty","🍃 breezy"];
let userMoods = [...DEFAULT_MOODS];
let settingsLoaded = false;
let moodManagerOpen = false;

let session = null;
let currentView = "today";
let entries = [];
let selectedMoods = new Set();
let selectedWeather = null;
let selectedTags = new Set();
let archiveTagFilter = null;
let originalContentAtLoad = "";
let timestampMarkerAdded = false;
let tagManagerOpen = false;
let saveTimer = null;

const todayStr = () => {
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
};

const fmtDate = (dateStr) => {
  const [y,m,d] = dateStr.split("-").map(Number);
  const dt = new Date(y, m-1, d);
  return dt.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'});
};

function dayOfYear(){
  const now = new Date();
  const start = new Date(now.getFullYear(),0,0);
  const diff = now - start;
  return Math.floor(diff / 86400000);
}

async function loadSettings(){
  const { data } = await sb.from("user_settings").select("moods").eq("user_id", session.user.id).maybeSingle();
  if (data && data.moods && data.moods.length){
    userMoods = data.moods;
  } else {
    userMoods = [...DEFAULT_MOODS];
    await sb.from("user_settings").upsert({ user_id: session.user.id, moods: userMoods });
  }
  settingsLoaded = true;
}

async function saveUserMoods(){
  await sb.from("user_settings").upsert({ user_id: session.user.id, moods: userMoods });
}

function addMood(text){
  const val = text.trim();
  if (!val) return;
  userMoods.push(val);
  saveUserMoods();
  render();
}

function renameMood(index, newVal){
  const val = newVal.trim();
  if (!val) return;
  userMoods[index] = val;
  saveUserMoods();
  render();
}

function deleteMood(index){
  userMoods.splice(index, 1);
  saveUserMoods();
  render();
}

function resetMoods(){
  userMoods = [...DEFAULT_MOODS];
  saveUserMoods();
  render();
}

async function init(){
  const { data } = await sb.auth.getSession();
  session = data.session;
  sb.auth.onAuthStateChange((_event, sess) => {
    session = sess;
    render();
  });
  render();
}

async function signIn(email, password){
  const msgEl = document.getElementById("authMsg");
  msgEl.textContent = "Signing in...";
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error){
    console.error("Sign in error:", error);
    msgEl.textContent = error.message || "Something went wrong — try again.";
  }
}

async function signUp(email, password){
  const msgEl = document.getElementById("authMsg");
  msgEl.textContent = "Creating account...";
  const { data, error } = await sb.auth.signUp({ email, password });
  if (error){
    console.error("Sign up error:", error);
    msgEl.textContent = error.message || "Something went wrong — try again.";
    return;
  }
  if (data.session){
    msgEl.textContent = "Account created!";
  } else {
    msgEl.textContent = "Account created — check your email to confirm, then sign in.";
  }
}

async function loadEntries(){
  const { data, error } = await sb
    .from("entries")
    .select("*")
    .order("entry_date", { ascending: false });
  if (!error) entries = data || [];
}

function computeStreak(){
  const dates = new Set(entries.filter(e => e.content && e.content.trim()).map(e => e.entry_date));
  let streak = 0;
  let cursor = new Date();
  // if today not written yet, start counting from yesterday
  if (!dates.has(todayStr())) cursor.setDate(cursor.getDate()-1);
  while (true){
    const ds = cursor.getFullYear()+"-"+String(cursor.getMonth()+1).padStart(2,"0")+"-"+String(cursor.getDate()).padStart(2,"0");
    if (dates.has(ds)){ streak++; cursor.setDate(cursor.getDate()-1); }
    else break;
  }
  return streak;
}

function onThisDayEntries(){
  const now = new Date();
  const mm = String(now.getMonth()+1).padStart(2,"0");
  const dd = String(now.getDate()).padStart(2,"0");
  return entries.filter(e => {
    const [,m,d] = e.entry_date.split("-");
    return m === mm && d === dd && e.entry_date !== todayStr() && e.content && e.content.trim();
  });
}

async function saveEntry(){
  const status = document.getElementById("saveStatus");
  const textEl = document.getElementById("entryText");
  const content = textEl ? textEl.value : (entries.find(e => e.entry_date === todayStr())?.content || "");
  if (status) status.textContent = "saving...";
  const date = todayStr();
  const existing = entries.find(e => e.entry_date === date);
  const moodStr = selectedMoods.size ? Array.from(selectedMoods).join(", ") : null;
  const payload = {
    user_id: session.user.id,
    entry_date: date,
    content,
    mood: moodStr,
    weather: selectedWeather,
    tags: Array.from(selectedTags)
  };
  let error, data;
  if (existing){
    ({ error } = await sb.from("entries").update(payload).eq("id", existing.id));
    if (!error) Object.assign(existing, payload);
  } else {
    ({ data, error } = await sb.from("entries").insert(payload).select().single());
    if (!error && data) entries.unshift(data);
  }
  const liveStatus = document.getElementById("saveStatus");
  if (liveStatus){
    liveStatus.textContent = error
      ? "couldn't save — try again"
      : "saved · " + new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  }
  renderStreak();
}

function scheduleSave(){
  clearTimeout(saveTimer);
  const status = document.getElementById("saveStatus");
  if (status) status.textContent = "typing...";
  saveTimer = setTimeout(saveEntry, 900);
}

function renderStreak(){
  const el = document.getElementById("streakVal");
  if (el) el.textContent = computeStreak();
}

function insertPrompt(){
  const ta = document.getElementById("entryText");
  const prompt = PROMPTS[dayOfYear() % PROMPTS.length];
  if (!ta.value.trim()){
    ta.value = prompt + "\n\n";
    ta.focus();
    ta.setSelectionRange(ta.value.length, ta.value.length);
  } else {
    ta.focus();
  }
  scheduleSave();
}

let wrappedYear = null;

function computeLongestStreak(dates){
  const sorted = Array.from(dates).sort();
  let longest = 0, current = 0, prevDate = null;
  for (const ds of sorted){
    const d = new Date(ds);
    if (prevDate){
      const diffDays = Math.round((d - prevDate) / 86400000);
      current = diffDays === 1 ? current + 1 : 1;
    } else {
      current = 1;
    }
    longest = Math.max(longest, current);
    prevDate = d;
  }
  return longest;
}

function renderWrapped(){
  const written = entries.filter(e => e.content && e.content.trim());
  if (!written.length){
    return `<div class="empty-state">Write a few entries and your year will start taking shape here.</div>`;
  }
  const years = Array.from(new Set(written.map(e => e.entry_date.slice(0,4)))).sort().reverse();
  if (!wrappedYear || !years.includes(wrappedYear)) wrappedYear = years[0];

  const yearEntries = written.filter(e => e.entry_date.startsWith(wrappedYear));
  if (!yearEntries.length){
    return `
      <div class="year-picker">${years.map(y => `<span class="year-pill ${y===wrappedYear?'active':''}" data-year="${y}">${y}</span>`).join("")}</div>
      <div class="empty-state">No entries yet for ${wrappedYear}.</div>
    `;
  }

  const totalWords = yearEntries.reduce((sum,e) => sum + e.content.trim().split(/\s+/).filter(Boolean).length, 0);
  const dates = new Set(yearEntries.map(e => e.entry_date));
  const longestStreak = computeLongestStreak(dates);

  const moodCounts = {};
  yearEntries.forEach(e => {
    if (e.mood) e.mood.split(", ").forEach(m => { moodCounts[m] = (moodCounts[m]||0)+1; });
  });
  const topMoods = Object.entries(moodCounts).sort((a,b) => b[1]-a[1]).slice(0,5);
  const maxMoodCount = topMoods.length ? topMoods[0][1] : 1;

  const monthCounts = Array(12).fill(0);
  yearEntries.forEach(e => { monthCounts[parseInt(e.entry_date.slice(5,7),10)-1]++; });
  const maxMonthCount = Math.max(...monthCounts, 1);
  const monthLabels = ["J","F","M","A","M","J","J","A","S","O","N","D"];

  return `
    <div class="wrapped-hero">
      <div class="wrapped-year">Your year in</div>
      <div class="wrapped-title">The Quiet Hours</div>
    </div>
    ${years.length > 1 ? `<div class="year-picker">${years.map(y => `<span class="year-pill ${y===wrappedYear?'active':''}" data-year="${y}">${y}</span>`).join("")}</div>` : ""}

    <div class="wrapped-grid">
      <div class="wrapped-stat"><div class="wrapped-stat-num pixel">${yearEntries.length}</div><div class="wrapped-stat-label">entries written</div></div>
      <div class="wrapped-stat"><div class="wrapped-stat-num pixel">${totalWords.toLocaleString()}</div><div class="wrapped-stat-label">words</div></div>
      <div class="wrapped-stat"><div class="wrapped-stat-num pixel">${longestStreak}</div><div class="wrapped-stat-label">longest streak</div></div>
      <div class="wrapped-stat"><div class="wrapped-stat-num">${topMoods[0] ? topMoods[0][0] : "—"}</div><div class="wrapped-stat-label">most felt mood</div></div>
    </div>

    <div class="wrapped-section">
      <div class="wrapped-section-title">Entries by month</div>
      <div class="month-bars">
        ${monthCounts.map((c,i) => `
          <div class="month-bar-wrap">
            <div class="month-bar" style="height:${Math.max((c/maxMonthCount)*100, c>0?6:0)}%"></div>
            <div class="month-label">${monthLabels[i]}</div>
          </div>
        `).join("")}
      </div>
    </div>

    ${topMoods.length ? `
      <div class="wrapped-section">
        <div class="wrapped-section-title">Moods of the year</div>
        ${topMoods.map(([m,c]) => `
          <div class="mood-bar-row">
            <span>${m}</span>
            <div class="mood-bar-track"><div class="mood-bar-fill" style="width:${(c/maxMoodCount)*100}%"></div></div>
            <span class="mood-bar-count">${c}</span>
          </div>
        `).join("")}
      </div>
    ` : ""}
  `;
}

let authMode = "signin"; // or "signup"

function renderAuth(){
  document.getElementById("app").innerHTML = `
    <div class="auth-screen">
      <span class="sprite-critter" style="width:44px;height:44px;"></span>
      <div class="auth-title">The Quiet Hours</div>
      <div class="auth-sub">${authMode === "signin" ? "Welcome back. Sign in to pick up where you left off." : "Create your account — just you, just for this."}</div>
      <div class="auth-form">
        <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email">
        <input type="password" id="passwordInput" placeholder="password" autocomplete="${authMode === 'signin' ? 'current-password' : 'new-password'}">
        <button class="btn" id="authSubmitBtn">${authMode === "signin" ? "Sign in" : "Create account"}</button>
        <button class="btn btn-ghost" id="authToggleBtn">${authMode === "signin" ? "New here? Create an account" : "Already have an account? Sign in"}</button>
        <div class="auth-msg" id="authMsg"></div>
      </div>
    </div>
  `;
  const submit = () => {
    const email = document.getElementById("emailInput").value.trim();
    const password = document.getElementById("passwordInput").value;
    if (!email || !password) return;
    if (authMode === "signin") signIn(email, password);
    else signUp(email, password);
  };
  document.getElementById("authSubmitBtn").addEventListener("click", submit);
  document.getElementById("passwordInput").addEventListener("keydown", (e) => {
    if (e.key === "Enter") submit();
  });
  document.getElementById("authToggleBtn").addEventListener("click", () => {
    authMode = authMode === "signin" ? "signup" : "signin";
    render();
  });
}

function renderArchive(){
  let written = entries.filter(e => e.content && e.content.trim()).sort((a,b) => b.entry_date.localeCompare(a.entry_date));
  if (!written.length){
    return `<div class="empty-state">Nothing written yet. Today is a good day to start.</div>`;
  }
  const allTags = Array.from(new Set(written.flatMap(e => e.tags || []))).sort();
  if (archiveTagFilter){
    written = written.filter(e => (e.tags || []).includes(archiveTagFilter));
  }
  return `
    ${allTags.length ? `
      <div class="filter-bar" id="filterBar">
        ${allTags.map(t => `<span class="filter-pill ${archiveTagFilter===t?'active':''}" data-tag="${t}">${t}</span>`).join("")}
        ${archiveTagFilter ? `<span class="filter-pill" id="clearFilter">clear ×</span>` : ""}
        <span class="filter-pill" id="manageTagsBtn">${tagManagerOpen ? "done" : "edit tags ✎"}</span>
      </div>
      ${tagManagerOpen ? `
        <div class="tag-manager">
          ${allTags.map(t => `
            <div class="tag-manager-row">
              <input type="text" class="tag-rename-input" data-old="${t}" value="${t}" maxlength="24">
              <button class="tag-manager-btn" data-action="save" data-old="${t}">save</button>
              <button class="tag-manager-btn tag-manager-delete" data-action="delete" data-old="${t}">delete</button>
            </div>
          `).join("")}
        </div>
      ` : ""}
    ` : ""}
    <div class="archive-list">
      ${written.map(e => `
        <div class="archive-item" data-date="${e.entry_date}">
          <div class="archive-date">
            <span>${fmtDate(e.entry_date)}</span>
            <span>${e.mood || ""} ${e.weather || ""}</span>
          </div>
          <div class="archive-preview">${e.content}</div>
          ${(e.tags && e.tags.length) ? `<div class="archive-tags">${e.tags.map(t => `<span class="archive-tag-pill">${t}</span>`).join("")}</div>` : ""}
        </div>
      `).join("")}
    </div>
  `;
}

function render(){
  if (!session){
    renderAuth();
    return;
  }
  if (!entries.length) {
    loadEntries().then(render);
  }
  if (!settingsLoaded) {
    loadSettings().then(render);
  }
  const app = document.getElementById("app");
  app.innerHTML = `
    <header>
      <div class="wordmark">The Quiet Hours <span class="flourish">✨</span></div>
      <nav>
        <button id="navToday" class="${currentView==='today'?'active':''}">Today</button>
        <button id="navArchive" class="${currentView==='archive'?'active':''}">Archive</button>
        <button id="navWrapped" class="${currentView==='wrapped'?'active':''}">Wrapped</button>
      </nav>
    </header>
    <main id="mainContent">
      ${currentView === 'today' ? renderToday() : currentView === 'archive' ? renderArchive() : renderWrapped()}
    </main>
  `;

  document.getElementById("navToday").addEventListener("click", () => { currentView="today"; render(); });
  document.getElementById("navArchive").addEventListener("click", () => { currentView="archive"; render(); });
  document.getElementById("navWrapped").addEventListener("click", () => { currentView="wrapped"; render(); });

  if (currentView === "today"){
    document.getElementById("entryText").addEventListener("input", scheduleSave);
    document.getElementById("entryText").addEventListener("focus", () => {
      const ta = document.getElementById("entryText");
      if (!timestampMarkerAdded && originalContentAtLoad.trim().length > 0 && ta.value === originalContentAtLoad){
        const time = new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
        ta.value = ta.value.replace(/\s+$/,'') + "\n\n— " + time + " —\n\n";
        ta.setSelectionRange(ta.value.length, ta.value.length);
        timestampMarkerAdded = true;
        scheduleSave();
      }
    });
    document.getElementById("promptChip").addEventListener("click", insertPrompt);
    document.querySelectorAll("#moodOptions .tag-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const m = btn.dataset.mood;
        if (selectedMoods.has(m)){ selectedMoods.delete(m); btn.classList.remove("selected"); }
        else { selectedMoods.add(m); btn.classList.add("selected"); }
        scheduleSave();
      });
    });
    const editMoodsBtn = document.getElementById("editMoodsBtn");
    if (editMoodsBtn) editMoodsBtn.addEventListener("click", () => { moodManagerOpen = !moodManagerOpen; render(); });
    document.querySelectorAll('[data-action="save-mood"]').forEach(btn => {
      btn.addEventListener("click", () => {
        const idx = parseInt(btn.dataset.index, 10);
        const input = document.querySelector(`.mood-rename-input[data-index="${idx}"]`);
        renameMood(idx, input.value);
      });
    });
    document.querySelectorAll('[data-action="delete-mood"]').forEach(btn => {
      btn.addEventListener("click", () => { deleteMood(parseInt(btn.dataset.index, 10)); });
    });
    const addMoodBtn = document.getElementById("addMoodBtn");
    if (addMoodBtn) addMoodBtn.addEventListener("click", () => {
      const input = document.getElementById("newMoodInput");
      addMood(input.value);
    });
    const resetMoodsBtn = document.getElementById("resetMoodsBtn");
    if (resetMoodsBtn) resetMoodsBtn.addEventListener("click", resetMoods);
    document.querySelectorAll("#weatherOptions .tag-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const w = btn.dataset.weather;
        const wasSelected = selectedWeather === w;
        document.querySelectorAll("#weatherOptions .tag-btn").forEach(b => b.classList.remove("selected"));
        selectedWeather = wasSelected ? null : w;
        if (selectedWeather) btn.classList.add("selected");
        scheduleSave();
      });
    });

    const addTag = () => {
      const input = document.getElementById("tagInput");
      const val = input.value.trim().toLowerCase();
      if (!val) return;
      selectedTags.add(val);
      input.value = "";
      renderChipList();
      scheduleSave();
    };
    document.getElementById("addTagBtn").addEventListener("click", addTag);
    document.getElementById("tagInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter"){ e.preventDefault(); addTag(); }
    });
    document.querySelectorAll("#chipList .chip button").forEach(btn => {
      btn.addEventListener("click", () => {
        selectedTags.delete(btn.dataset.tag);
        renderChipList();
        scheduleSave();
      });
    });
  } else if (currentView === "archive") {
    document.querySelectorAll(".archive-item").forEach(item => {
      item.addEventListener("click", () => {
        currentView = "today";
        const date = item.dataset.date;
        openEntry(date);
      });
    });
    document.querySelectorAll(".filter-pill[data-tag]").forEach(pill => {
      pill.addEventListener("click", (e) => {
        e.stopPropagation();
        archiveTagFilter = archiveTagFilter === pill.dataset.tag ? null : pill.dataset.tag;
        render();
      });
    });
    const clearBtn = document.getElementById("clearFilter");
    if (clearBtn) clearBtn.addEventListener("click", (e) => { e.stopPropagation(); archiveTagFilter = null; render(); });
    const manageBtn = document.getElementById("manageTagsBtn");
    if (manageBtn) manageBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      tagManagerOpen = !tagManagerOpen;
      render();
    });
    document.querySelectorAll(".tag-manager-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        const old = btn.dataset.old;
        if (btn.dataset.action === "delete"){
          deleteTagGlobally(old);
        } else {
          const input = document.querySelector(`.tag-rename-input[data-old="${old}"]`);
          renameTagGlobally(old, input.value);
        }
      });
    });
  } else if (currentView === "wrapped") {
    document.querySelectorAll(".year-pill").forEach(pill => {
      pill.addEventListener("click", () => { wrappedYear = pill.dataset.year; render(); });
    });
  }
}

async function renameTagGlobally(oldTag, newTagRaw){
  const newTag = newTagRaw.trim().toLowerCase();
  if (!newTag || newTag === oldTag) return;
  const affected = entries.filter(e => (e.tags||[]).includes(oldTag));
  for (const e of affected){
    const newTags = Array.from(new Set(e.tags.map(t => t === oldTag ? newTag : t)));
    const { error } = await sb.from("entries").update({ tags: newTags }).eq("id", e.id);
    if (!error) e.tags = newTags;
  }
  if (archiveTagFilter === oldTag) archiveTagFilter = newTag;
  render();
}

async function deleteTagGlobally(tag){
  const affected = entries.filter(e => (e.tags||[]).includes(tag));
  for (const e of affected){
    const newTags = e.tags.filter(t => t !== tag);
    const { error } = await sb.from("entries").update({ tags: newTags }).eq("id", e.id);
    if (!error) e.tags = newTags;
  }
  if (archiveTagFilter === tag) archiveTagFilter = null;
  render();
}

function renderChipList(){
  const list = document.getElementById("chipList");
  if (!list) return;
  list.innerHTML = Array.from(selectedTags).map(t => `<span class="chip">${t}<button data-tag="${t}">×</button></span>`).join("");
  list.querySelectorAll("button").forEach(btn => {
    btn.addEventListener("click", () => {
      selectedTags.delete(btn.dataset.tag);
      renderChipList();
      scheduleSave();
    });
  });
}

let viewingDate = null;
function openEntry(date){
  viewingDate = date;
  const entry = entries.find(e => e.entry_date === date);
  const app = document.getElementById("app");
  app.innerHTML = `
    <header>
      <div class="wordmark">The Quiet Hours <span class="flourish">✨</span></div>
      <nav><button id="backBtn">← Back to Archive</button></nav>
    </header>
    <main>
      <div class="date-line">${fmtDate(date)}</div>
      <textarea id="entryTextView" placeholder="Write whatever's on your mind...">${entry ? entry.content : ""}</textarea>
      <div class="save-row"><div class="save-status" id="saveStatusView">saved</div></div>
    </main>
  `;
  document.getElementById("backBtn").addEventListener("click", () => { currentView="archive"; viewingDate=null; render(); });
  let t = null;
  document.getElementById("entryTextView").addEventListener("input", (e) => {
    clearTimeout(t);
    document.getElementById("saveStatusView").textContent = "typing...";
    t = setTimeout(async () => {
      const existing = entries.find(x => x.entry_date === date);
      const { error } = await sb.from("entries").update({ content: e.target.value }).eq("id", existing.id);
      document.getElementById("saveStatusView").textContent = error ? "couldn't save" : "saved";
      if (!error) await loadEntries();
    }, 1200);
  });
}
